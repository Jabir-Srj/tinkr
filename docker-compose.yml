version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tools-rmv-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tools_rmv_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tools-rmv-network

networks:
  tools-rmv-network:
    driver: bridge

volumes:
  postgres_data:
